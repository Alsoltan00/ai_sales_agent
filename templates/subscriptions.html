<!DOCTYPE html>
<html lang="ar" dir="rtl" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطط الاشتراك | نظام وكيل المبيعات الذكي</title>
    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #f59e0b;
            --primary-rgb: 245, 158, 11;
            --secondary: #ef4444;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Noto Kufi Arabic', 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(var(--primary-rgb), 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(239, 68, 68, 0.1) 0px, transparent 50%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 2rem;
        }

        .container-box {
            text-align: center;
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            padding: 4rem 3rem;
            border-radius: 2.5rem;
            border: 1px solid var(--glass-border);
            max-width: 600px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gem-icon {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 2rem;
            display: inline-block;
            filter: drop-shadow(0 0 15px rgba(var(--primary-rgb), 0.3));
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            line-height: 1.8;
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #d97706);
            border: none;
            border-radius: 1rem;
            padding: 1rem 3rem;
            font-weight: 700;
            box-shadow: 0 10px 20px -5px rgba(var(--primary-rgb), 0.4);
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(var(--primary-rgb), 0.5);
        }
    </style>
</head>
<body>
    <div class="container-box">
        <div class="gem-icon">
            <i class="ti ti-diamond"></i>
        </div>
        <h1>خطط الاشتراك</h1>
        <p>شكراً لاهتمامك! هذه الصفحة قيد التطوير حالياً. قريباً ستتمكن من اختيار الباقة المناسبة لشركتك والبدء في استخدام وكيل المبيعات الذكي.</p>
        <a href="/login" class="btn btn-primary">العودة للرئيسية</a>
    </div>
</body>
</html>
