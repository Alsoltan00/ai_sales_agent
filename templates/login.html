<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول والاشتراك | نظام وكيل المبيعات الذكي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --card-bg: rgba(15, 23, 42, 0.8);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Kufi Arabic', 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.5s ease;
        }

        .header-text { text-align: center; margin-bottom: 35px; }
        .header-text i { font-size: 2.8rem; color: var(--primary); margin-bottom: 15px; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-text h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; }
        .header-text p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }

        .form-group { margin-bottom: 20px; }
        .label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #cbd5e1; font-weight: 600; }
        
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #64748b; transition: 0.3s; }
        
        .input, select {
            width: 100%;
            padding: 14px 45px 14px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            color: white;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        select option { background: var(--bg-dark); color: white; }

        .input:focus, select:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }
        
        .input:focus + i { color: var(--primary); }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
            box-shadow: 0 10px 20px -10px var(--primary);
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px -10px var(--primary); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .toggle-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: var(--text-muted);
            font-size: 0.95rem;
            text-decoration: none;
        }
        .toggle-link span { color: var(--primary); font-weight: 700; margin-right: 5px; }

        .alert {
            padding: 14px; border-radius: 14px; margin-bottom: 25px;
            font-size: 0.9rem; display: none; text-align: center;
        }
        .alert-error { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .alert-success { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }

        /* Conditional Field Animation */
        #storeLinkGroup, #otherActivityGroup, #passwordRequirements { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .requirements-list { 
            font-size: 0.75rem; color: var(--text-muted); padding: 10px; 
            background: rgba(0,0,0,0.2); border-radius: 10px; margin-top: 5px;
        }
        .requirement.met { color: #4ade80; }
        .requirement.met i { content: '\f00c'; }
    </style>
</head>
<body>

    <div class="auth-card" id="authCard">
        <!-- Login View -->
        <div id="loginView">
            <div class="header-text">
                <i class="fa-solid fa-rocket"></i>
                <h1>مرحباً بعودتك</h1>
                <p>سجل دخولك لإدارة وكلاء المبيعات الذكية</p>
            </div>

            <div id="loginAlert" class="alert alert-error"></div>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="label">البريد أو رقم التواصل</label>
                    <div class="input-wrapper">
                        <input type="text" id="loginContact" class="input" placeholder="example@mail.com" required>
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label class="label">كلمة المرور</label>
                    <div class="input-wrapper">
                        <input type="password" id="loginPassword" class="input" placeholder="••••••••" required>
                        <i class="fa-solid fa-lock"></i>
                    </div>
                </div>
                <button type="submit" class="btn" id="loginBtn">تسجيل الدخول</button>
                <a href="#" class="toggle-link" onclick="switchView('register')">ليس لديك حساب؟ <span>سجل الآن كتاجر</span></a>
            </form>
        </div>

        <!-- Register View -->
        <div id="registerView" style="display: none;">
            <div class="header-text">
                <i class="fa-solid fa-user-plus"></i>
                <h1>ابدأ رحلة نموك اليوم</h1>
                <p>سجل بياناتك وانضم لآلاف التجار الذين يستخدمون الوكيل الذكي</p>
            </div>

            <div id="registerAlert" class="alert"></div>

            <form onsubmit="handleRegister(event)">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label class="label">اسم الشركة / المتجر</label>
                        <div class="input-wrapper">
                            <input type="text" id="regCompany" class="input" placeholder="أدخل اسم نشاطك التجاري" required>
                            <i class="fa-solid fa-store"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="label">البريد الإلكتروني</label>
                        <div class="input-wrapper">
                            <input type="email" id="regEmail" class="input" placeholder="mail@example.com" required>
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="label">رقم الجوال (واتساب)</label>
                        <div class="input-wrapper">
                            <input type="text" id="regContact" class="input" placeholder="9665XXXXXXXX" required>
                            <i class="fa-solid fa-phone"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="label">نوع النشاط</label>
                        <div class="input-wrapper">
                            <select id="regBusinessType" class="input" onchange="handleBusinessTypeChange()" required>
                                <option value="">اختر نوع النشاط</option>
                                <option value="store">متجر إلكتروني</option>
                                <option value="service">شركة خدمات</option>
                                <option value="freelance">عمل حر / فردي</option>
                                <option value="other">أخرى</option>
                            </select>
                            <i class="fa-solid fa-briefcase"></i>
                        </div>
                    </div>
                    <div class="form-group" id="otherActivityGroup">
                        <label class="label">وصف النشاط</label>
                        <div class="input-wrapper">
                            <input type="text" id="regOtherActivity" class="input" placeholder="مثلاً: صالون حلاقة، مطعم...">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </div>
                    </div>
                    <div class="form-group" id="storeLinkGroup">
                        <label class="label">رابط المتجر</label>
                        <div class="input-wrapper">
                            <input type="url" id="regStoreLink" class="input" placeholder="https://salla.sa/yourstore">
                            <i class="fa-solid fa-link"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="label">كلمة المرور</label>
                        <div class="input-wrapper">
                            <input type="password" id="regPassword" class="input" placeholder="••••••••" onfocus="showPassRequirements()" oninput="validatePassStrength()" required>
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <div id="passwordRequirements" class="requirements-list">
                            <div id="req-len" class="requirement"><i class="fa-solid fa-circle-dot"></i> 8 أحرف على الأقل</div>
                            <div id="req-up" class="requirement"><i class="fa-solid fa-circle-dot"></i> حرف كبير واحد (A-Z)</div>
                            <div id="req-num" class="requirement"><i class="fa-solid fa-circle-dot"></i> رقم واحد على الأقل</div>
                            <div id="req-spec" class="requirement"><i class="fa-solid fa-circle-dot"></i> رمز خاص (!@#$)</div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="label">تأكيد كلمة المرور</label>
                        <div class="input-wrapper">
                            <input type="password" id="regConfirmPassword" class="input" placeholder="••••••••" required>
                            <i class="fa-solid fa-shield-check"></i>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn" id="registerBtn">إنشاء الحساب</button>
                <a href="#" class="toggle-link" onclick="switchView('login')">لديك حساب بالفعل؟ <span>تسجيل الدخول</span></a>
            </form>
        </div>
    </div>

    <script>
        function showPassRequirements() {
            document.getElementById('passwordRequirements').style.display = 'block';
        }

        function validatePassStrength() {
            const pass = document.getElementById('regPassword').value;
            const reqs = {
                'req-len': pass.length >= 8,
                'req-up': /[A-Z]/.test(pass),
                'req-num': /[0-9]/.test(pass),
                'req-spec': /[!@#$%^&*(),.?":{}|<>]/.test(pass)
            };

            for (const [id, met] of Object.entries(reqs)) {
                const el = document.getElementById(id);
                if (met) {
                    el.classList.add('met');
                    el.querySelector('i').className = 'fa-solid fa-circle-check';
                } else {
                    el.classList.remove('met');
                    el.querySelector('i').className = 'fa-solid fa-circle-dot';
                }
            }
        }

        function switchView(view) {
            const card = document.getElementById('authCard');
            if(view === 'register') {
                document.getElementById('loginView').style.display = 'none';
                document.getElementById('registerView').style.display = 'block';
                card.style.maxWidth = '600px';
            } else {
                document.getElementById('registerView').style.display = 'none';
                document.getElementById('loginView').style.display = 'block';
                card.style.maxWidth = '500px';
            }
        }

        function handleBusinessTypeChange() {
            const type = document.getElementById('regBusinessType').value;
            const storeGroup = document.getElementById('storeLinkGroup');
            const otherGroup = document.getElementById('otherActivityGroup');
            
            storeGroup.style.display = type === 'store' ? 'block' : 'none';
            otherGroup.style.display = type === 'other' ? 'block' : 'none';
            
            if(type === 'store') storeGroup.classList.add('full-width');
            if(type === 'other') otherGroup.classList.add('full-width');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const contactInfo = document.getElementById('loginContact').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            
            btn.disabled = true;
            btn.innerText = 'جاري التحقق...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contact_info: contactInfo, password: password })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    window.location.href = data.redirect_url;
                } else {
                    const alert = document.getElementById('loginAlert');
                    alert.innerText = data.message;
                    alert.style.display = 'block';
                }
            } catch (err) {
                alert('خطأ في الاتصال بالخادم');
            } finally {
                btn.disabled = false;
                btn.innerText = 'تسجيل الدخول';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if (password !== confirmPassword) {
                const alert = document.getElementById('registerAlert');
                alert.innerText = 'كلمات المرور غير متطابقة';
                alert.className = 'alert alert-error';
                alert.style.display = 'block';
                return;
            }

            const passRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*(),.?":{}|<>]).{8,}$/;
            if (!passRegex.test(password)) {
                const alert = document.getElementById('registerAlert');
                alert.innerText = 'يرجى الالتزام بسياسة كلمة المرور القوية';
                alert.className = 'alert alert-error';
                alert.style.display = 'block';
                return;
            }

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerText = 'جاري المعالجة...';

            let businessType = document.getElementById('regBusinessType').value;
            if (businessType === 'other') {
                businessType = document.getElementById('regOtherActivity').value;
            }

            const payload = {
                company_name: document.getElementById('regCompany').value,
                contact_number: document.getElementById('regContact').value,
                email: document.getElementById('regEmail').value,
                password: password,
                business_type: businessType,
                store_link: document.getElementById('regStoreLink').value
            };

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                const alert = document.getElementById('registerAlert');
                alert.innerText = data.message;
                alert.className = data.status === 'success' ? 'alert alert-success' : 'alert alert-error';
                alert.style.display = 'block';
                
                if(data.status === 'success') {
                    setTimeout(() => switchView('login'), 3000);
                }
            } catch (err) {
                alert('خطأ في الاتصال');
            } finally {
                btn.disabled = false;
                btn.innerText = 'إنشاء الحساب';
            }
        }
    </script>
</body>
</html>
