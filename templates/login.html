<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | منصة الذكاء الاصطناعي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans Arabic', 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-blobs {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 500px; height: 500px;
            background: var(--primary);
            filter: blur(120px);
            opacity: 0.2;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 50px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
        }

        .logo-box {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(139, 92, 246, 0.5));
        }

        h1 { font-size: 1.8rem; margin-bottom: 10px; font-weight: 800; }
        p { color: var(--text-muted); margin-bottom: 35px; font-size: 0.95rem; }

        .form-group { text-align: right; margin-bottom: 20px; }
        .label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted); }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            right: 15px;
            color: var(--primary);
        }

        .input {
            width: 100%;
            padding: 15px 45px 15px 15px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.4);
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(139, 92, 246, 0.5);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob"></div>
    </div>

    <div class="login-card">
        <div class="logo-box">
            <i class="fa-solid fa-brain"></i>
        </div>
        <h1>مرحباً بك مجدداً</h1>
        <p>قم بتسجيل الدخول للوصول إلى لوحة التحكم</p>

        <div id="errorBox" class="error-msg"></div>

        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="label">اسم المستخدم</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" class="input" placeholder="أدخل اسم المستخدم" required>
                </div>
            </div>
            <div class="form-group">
                <label class="label">كلمة المرور</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" class="input" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn" id="loginBtn">تسجيل الدخول</button>
        </form>

        <div style="margin-top: 30px; font-size: 0.85rem; color: var(--text-muted);">
            منصة الذكاء الاصطناعي للمبيعات &copy; 2024
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('errorBox');
            const loginBtn = document.getElementById('loginBtn');

            errorBox.style.display = 'none';
            loginBtn.innerText = 'جاري التحقق...';
            loginBtn.disabled = true;

            try {
                const res = await fetch('/admin/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    window.location.href = '/admin';
                } else {
                    errorBox.innerText = data.message || 'خطأ في تسجيل الدخول';
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                errorBox.innerText = 'خطأ في الاتصال بالخادم';
                errorBox.style.display = 'block';
            } finally {
                loginBtn.innerText = 'تسجيل الدخول';
                loginBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
