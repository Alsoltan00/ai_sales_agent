<!DOCTYPE html>
<html lang="ar" dir="rtl" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول والاشتراك | نظام وكيل المبيعات الذكي</title>
    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #f59e0b;
            --primary-rgb: 245, 158, 11;
            --secondary: #ef4444;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Noto Kufi Arabic', 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(var(--primary-rgb), 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(239, 68, 68, 0.1) 0px, transparent 50%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            margin: 0;
        }

        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 2rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .auth-card:hover {
            border-color: rgba(var(--primary-rgb), 0.3);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 20px -5px rgba(var(--primary-rgb), 0.5);
            font-size: 2rem;
            color: white;
        }

        .form-control {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 0.875rem 1.25rem;
            color: white;
            transition: all 0.2s;
        }

        .form-control:focus {
            background: rgba(15, 23, 42, 0.9);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(var(--primary-rgb), 0.15);
            color: white;
        }

        .input-group-text {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            color: #94a3b8;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #d97706);
            border: none;
            border-radius: 1rem;
            padding: 1rem;
            font-weight: 700;
            box-shadow: 0 10px 20px -5px rgba(var(--primary-rgb), 0.4);
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(var(--primary-rgb), 0.5);
            background: linear-gradient(135deg, #fbbf24, var(--primary));
        }

        .toggle-link {
            color: #94a3b8;
            text-decoration: none;
            transition: 0.2s;
            font-weight: 500;
        }

        .toggle-link span {
            color: var(--primary);
            font-weight: 700;
        }

        .toggle-link:hover {
            color: white;
        }

        #storeLinkGroup, #otherActivityGroup, #passwordRequirements { 
            display: none; 
            animation: slideDown 0.4s ease; 
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .requirement { font-size: 0.75rem; color: #94a3b8; }
        .requirement.met { color: #10b981; }
    </style>
</head>
<body>

    <div class="auth-card" id="authCard" style="max-width: {{ '600px' if view == 'register' else '500px' }}">
        
        <!-- Login View -->
        <div id="loginView" style="display: {{ 'none' if view == 'register' else 'block' }}">
            <div class="text-center mb-5">
                <div class="brand-icon">
                    <i class="ti ti-rocket"></i>
                </div>
                <h1 class="h3 fw-bold mb-2">مرحباً بعودتك</h1>
                <p class="text-secondary">سجل دخولك لإدارة وكلاء المبيعات الذكية</p>
            </div>

            <div id="loginAlert" class="alert alert-danger d-none rounded-4 border-0 bg-danger-subtle text-danger small"></div>

            <form onsubmit="handleLogin(event)">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">البريد أو رقم التواصل</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0 rounded-start-4"><i class="ti ti-mail fs-5"></i></span>
                        <input type="text" id="loginContact" class="form-control border-start-0 rounded-end-4" placeholder="example@mail.com" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary">كلمة المرور</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0 rounded-start-4"><i class="ti ti-lock fs-5"></i></span>
                        <input type="password" id="loginPassword" class="form-control border-start-0 rounded-end-4" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-4" id="loginBtn">تسجيل الدخول</button>
                
                <div class="text-center">
                    <a href="/register" class="toggle-link" onclick="history.pushState(null, '', '/register'); switchView('register'); return false;">
                        ليس لديك حساب؟ <span>سجل الآن كتاجر</span>
                    </a>
                </div>
            </form>
        </div>

        <!-- Register View -->
        <div id="registerView" style="display: {{ 'block' if view == 'register' else 'none' }}">
            <div class="text-center mb-5">
                <div class="brand-icon">
                    <i class="ti ti-user-plus"></i>
                </div>
                <h1 class="h3 fw-bold mb-2">ابدأ رحلة نموك اليوم</h1>
                <p class="text-secondary small">سجل بياناتك وانضم لآلاف التجار الذين يستخدمون الوكيل الذكي</p>
            </div>

            <div id="registerAlert" class="alert d-none rounded-4 border-0 small"></div>

            <form onsubmit="handleRegister(event)">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label small fw-bold text-secondary">اسم الشركة / المتجر</label>
                        <input type="text" id="regCompany" class="form-control" placeholder="أدخل اسم نشاطك التجاري" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-secondary">البريد الإلكتروني</label>
                        <input type="email" id="regEmail" class="form-control" placeholder="mail@example.com" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-secondary">رقم الجوال (واتساب)</label>
                        <input type="text" id="regContact" class="form-control text-start" dir="ltr" placeholder="9665XXXXXXXX" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label small fw-bold text-secondary">نوع النشاط</label>
                        <select id="regBusinessType" class="form-select form-control" onchange="handleBusinessTypeChange()" required>
                            <option value="">اختر نوع النشاط</option>
                            <option value="store">متجر إلكتروني</option>
                            <option value="service">شركة خدمات</option>
                            <option value="freelance">عمل حر / فردي</option>
                            <option value="other">أخرى</option>
                        </select>
                    </div>
                    <div class="col-12" id="otherActivityGroup">
                        <label class="form-label small fw-bold text-secondary">وصف النشاط</label>
                        <input type="text" id="regOtherActivity" class="form-control" placeholder="مثلاً: صالون حلاقة، مطعم...">
                    </div>
                    <div class="col-12" id="storeLinkGroup">
                        <label class="form-label small fw-bold text-secondary">رابط المتجر</label>
                        <input type="url" id="regStoreLink" class="form-control" placeholder="https://salla.sa/yourstore">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-secondary">كلمة المرور</label>
                        <input type="password" id="regPassword" class="form-control" placeholder="••••••••" onfocus="showPassRequirements()" oninput="validatePassStrength()" required>
                        <div id="passwordRequirements" class="p-2 mt-2 bg-black bg-opacity-25 rounded-3">
                            <div id="req-len" class="requirement"><i class="ti ti-circle-dot"></i> 8 أحرف على الأقل</div>
                            <div id="req-up" class="requirement"><i class="ti ti-circle-dot"></i> حرف كبير واحد</div>
                            <div id="req-num" class="requirement"><i class="ti ti-circle-dot"></i> رقم واحد على الأقل</div>
                            <div id="req-spec" class="requirement"><i class="ti ti-circle-dot"></i> رمز خاص (!@#$)</div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-secondary">تأكيد كلمة المرور</label>
                        <input type="password" id="regConfirmPassword" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mt-4 mb-4" id="registerBtn">إنشاء الحساب</button>
                
                <div class="text-center">
                    <a href="/login" class="toggle-link" onclick="history.pushState(null, '', '/login'); switchView('login'); return false;">
                        لديك حساب بالفعل؟ <span>تسجيل الدخول</span>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function showPassRequirements() {
            document.getElementById('passwordRequirements').style.display = 'block';
        }

        function validatePassStrength() {
            const pass = document.getElementById('regPassword').value;
            const reqs = {
                'req-len': pass.length >= 8,
                'req-up': /[A-Z]/.test(pass),
                'req-num': /[0-9]/.test(pass),
                'req-spec': /[!@#$%^&*(),.?":{}|<> ]/.test(pass)
            };

            for (const [id, met] of Object.entries(reqs)) {
                const el = document.getElementById(id);
                if (met) {
                    el.classList.add('met');
                    el.querySelector('i').className = 'ti ti-circle-check-filled';
                } else {
                    el.classList.remove('met');
                    el.querySelector('i').className = 'ti ti-circle-dot';
                }
            }
        }

        function switchView(view) {
            const card = document.getElementById('authCard');
            if(view === 'register') {
                document.getElementById('loginView').style.display = 'none';
                document.getElementById('registerView').style.display = 'block';
                card.style.maxWidth = '600px';
            } else {
                document.getElementById('registerView').style.display = 'none';
                document.getElementById('loginView').style.display = 'block';
                card.style.maxWidth = '500px';
            }
        }

        function handleBusinessTypeChange() {
            const type = document.getElementById('regBusinessType').value;
            document.getElementById('storeLinkGroup').style.display = type === 'store' ? 'block' : 'none';
            document.getElementById('otherActivityGroup').style.display = type === 'other' ? 'block' : 'none';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const contactInfo = document.getElementById('loginContact').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const alertBox = document.getElementById('loginAlert');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> جاري التحقق...';
            alertBox.classList.add('d-none');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contact_info: contactInfo, password: password })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    window.location.href = data.redirect_url;
                } else {
                    alertBox.innerText = data.message;
                    alertBox.classList.remove('d-none');
                }
            } catch (err) {
                alertBox.innerText = 'خطأ في الاتصال بالخادم';
                alertBox.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                btn.innerText = 'تسجيل الدخول';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const alertBox = document.getElementById('registerAlert');

            if (password !== confirmPassword) {
                alertBox.innerText = 'كلمات المرور غير متطابقة';
                alertBox.className = 'alert alert-danger rounded-4 border-0 small';
                alertBox.classList.remove('d-none');
                return;
            }

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> جاري المعالجة...';

            let businessType = document.getElementById('regBusinessType').value;
            if (businessType === 'other') {
                businessType = document.getElementById('regOtherActivity').value;
            }

            const payload = {
                company_name: document.getElementById('regCompany').value,
                contact_number: document.getElementById('regContact').value,
                email: document.getElementById('regEmail').value,
                password: password,
                business_type: businessType,
                store_link: document.getElementById('regStoreLink').value
            };

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                alertBox.innerText = data.message;
                alertBox.className = `alert ${data.status === 'success' ? 'alert-success bg-success-subtle text-success' : 'alert-danger bg-danger-subtle text-danger'} rounded-4 border-0 small`;
                alertBox.classList.remove('d-none');
                
                if(data.status === 'success') {
                    setTimeout(() => window.location.href = '/register/success', 1500);
                }
            } catch (err) {
                alertBox.innerText = 'خطأ في الاتصال بالخادم';
                alertBox.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                btn.innerText = 'إنشاء الحساب';
            }
        }
    </script>
</body>
</html>
